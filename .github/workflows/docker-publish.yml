name: Build and Publish ZoneMinder Docker Images

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Run automatically on the 1st of every month at 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      zm_version:
        description: 'ZoneMinder version to build (leave empty to fetch latest)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: nardo86/zoneminder
  ZM_FALLBACK_VERSION: '1.38.1'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      zm-version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve ZoneMinder version
        id: resolve
        run: |
          set -eux
          INPUT_VERSION="${{ github.event.inputs.zm_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "Using workflow_dispatch input: $INPUT_VERSION"
            VERSION="$INPUT_VERSION"
          else
            echo "Fetching latest ZoneMinder release from GitHub API"
            VERSION=$(curl -fsSL https://api.github.com/repos/ZoneMinder/zoneminder/releases/latest | jq -r '.tag_name' || true)
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "API lookup failed, using fallback ${ZM_FALLBACK_VERSION}"
              VERSION="${ZM_FALLBACK_VERSION}"
            fi
          fi
          echo "Resolved ZoneMinder version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build (and push on non-PR) per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            ZM_VERSION=${{ needs.prepare.outputs.zm-version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    needs: [prepare, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Compute final tags
        id: tags
        run: |
          set -eux
          ZM_VERSION="${{ needs.prepare.outputs.zm-version }}"
          DATE_TAG=$(date -u +'%Y.%m')
          TAGS=()
          # Always tag the ZM version
          TAGS+=("${REGISTRY}/${IMAGE_NAME}:zm-${ZM_VERSION}")
          # On default branch: also latest + YYYY.MM
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:latest")
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:${DATE_TAG}")
          fi
          # On a v*.*.* tag push: also a semver tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            SEMVER="${{ github.ref_name }}"
            SEMVER="${SEMVER#v}"
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:${SEMVER}")
          fi
          printf 'tag=%s\n' "${TAGS[@]}"
          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        run: |
          set -eux
          SOURCES="${REGISTRY}/${IMAGE_NAME}:build-amd64 ${REGISTRY}/${IMAGE_NAME}:build-arm64"
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(-t "$tag")
          done <<< "${{ steps.tags.outputs.tags }}"
          docker buildx imagetools create "${TAG_ARGS[@]}" $SOURCES

      - name: Delete per-arch build tags from Docker Hub
        # The per-arch images already exist inside the manifest by digest;
        # the build-amd64 / build-arm64 tags are only needed during this
        # workflow and would otherwise show up as user-visible tags forever.
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
        run: |
          set -eu
          JWT=$(curl -fsSL -X POST https://hub.docker.com/v2/users/login/ \
              -H 'Content-Type: application/json' \
              -d "{\"username\":\"${DOCKER_HUB_USERNAME}\",\"password\":\"${DOCKER_HUB_TOKEN}\"}" \
              | python3 -c 'import json,sys;print(json.load(sys.stdin)["token"])')
          for tag in build-amd64 build-arm64; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE \
                -H "Authorization: JWT ${JWT}" \
                "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${tag}/")
            echo "DELETE ${tag} -> HTTP ${code}"
            # 204 = success, 404 = already gone (also fine)
            case "$code" in
              204|404) ;;
              *) echo "Unexpected response, failing"; exit 1 ;;
            esac
          done

      - name: Update Docker Hub description
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
